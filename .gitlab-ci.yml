stages:
  - build
  - check

default:
  image: nixos/nix
  before_script:
    # Enable flakes and nix-command in the container
    - echo "experimental-features = nix-command flakes" >> /etc/nix/nix.conf

# ---------------------------------------------------------------------------
# Build Stage
# ---------------------------------------------------------------------------
build:
  stage: build
  script:
    - nix develop -c make build
  artifacts:
    paths:
      - build/pico-sdk.uf2
      - build/pico-sdk.elf
    expire_in: 1 week

# ---------------------------------------------------------------------------
# Check Stage
# ---------------------------------------------------------------------------
clang-format:
  stage: check
  needs:
    - job: build
      artifacts: false
  script:
    - nix develop -c bash -c 'find src -name "*.c" -o -name "*.h" | xargs clang-format --dry-run --Werror -style=file'

cppcheck:
  stage: check
  needs:
    - job: build
      artifacts: false
  script:
    - nix develop -c bash -c 'cppcheck --enable=warning,style,performance,portability --suppress=missingIncludeSystem --error-exitcode=1 src/'
